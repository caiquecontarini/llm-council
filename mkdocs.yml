site_name: LLM Council
site_description: Sistema de Tomada de Decisão Multi-IA
site_author: Caique Contarini
site_url: https://caiquecontarini.github.io/llm-council/
repo_url: https://github.com/caiquecontarini/llm-council
repo_name: caiquecontarini/llm-council

theme:
  name: material
  palette:
    - scheme: slate
      primary: purple
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Light mode
    - scheme: default
      primary: purple
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc

nav:
  - Home: index.md
  - Arquitetura: arquitetura.md
  - Como Usar: como-usar.md
  - Casos de Uso: casos-uso.md
  - API: api.md
  - GitHub: https://github.com/caiquecontarini/llm-council
